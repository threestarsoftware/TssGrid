<script>
(function () {
  var doc = document.getElementById('doc');

  // README を取得（ライブは /README.md、ローカル開発は ../README.md にフォールバック）
  async function fetchReadme() {
    for (var _i = 0, urls = ['README.md', '../README.md']; _i < urls.length; _i++) {
      try { var r = await fetch(urls[_i]); if (r.ok) return await r.text(); } catch (e) {}
    }
    return null;
  }

  async function render() {
    var md = await fetchReadme();
    if (md == null || !window.marked) {
      doc.innerHTML = '<p class="doc-load">ドキュメントを読み込めませんでした。<a href="https://github.com/threestarsoftware/TssGrid#readme">GitHub の README</a> をご覧ください。</p>';
      return;
    }
    doc.innerHTML = marked.parse(md, { gfm: true });
    buildNav();
    // 初回ロードで #hash があればそこへ
    if (location.hash) { var t = document.getElementById(location.hash.slice(1)); if (t) t.scrollIntoView(); }
  }

  function buildNav() {
    var heads = doc.querySelectorAll('h2, h3');
    var nav = document.getElementById('nav');
    var links = [];
    heads.forEach(function (h, i) {
      h.id = 'sec-' + i;
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      a.className = (h.tagName === 'H3') ? 'lv3' : 'lv2';
      nav.appendChild(a);
      links.push(a);
    });
    // スクロール追従（今読んでいる見出しをハイライト）
    function spy() {
      var cur = null;
      heads.forEach(function (h) { if (h.getBoundingClientRect().top <= 96) cur = h.id; });
      links.forEach(function (a) { a.classList.toggle('active', a.getAttribute('href') === '#' + cur); });
    }
    window.addEventListener('scroll', spy, { passive: true });
    spy();
    // モバイルは目次を畳む
    if (window.matchMedia('(max-width:900px)').matches) { var toc = document.getElementById('toc'); if (toc) toc.open = false; }
  }

  render();
})();
</script>
