<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TssGrid 例 — ヒートマップ / データバー（cellStyle）</title>
<link rel="stylesheet" href="../src/tssgrid.css">
<style>
  body { font-family: "Meiryo UI", "Meiryo", "Segoe UI", sans-serif; margin: 0; background: #eef1f5; color: #1f2733; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 22px 20px 60px; }
  h1 { font-size: 18px; margin: 4px 0 2px; } .pill { display:inline-block; background:#1573c0; color:#fff; border-radius:10px; padding:1px 9px; font-size:12px; vertical-align:2px; }
  .note { background:#fff; border:1px solid #dde3ea; border-radius:8px; padding:11px 15px; font-size:12.5px; max-width:760px; color:#445; line-height:1.7; }
  .note b{ color:#1573c0; } code{ background:#eef2f6; padding:0 4px; border-radius:3px; }
  .panel { background:#fff; border:1px solid #e2e7ee; border-radius:10px; padding:14px 16px; margin-top:14px; box-shadow:0 1px 3px rgba(20,40,80,.05); }
  .hm .tssgrid { --tg-accent:#1573c0; --tg-header-bg:#334155; --tg-header-fg:#f1f5f9; --tg-font-size:12.5px; }
  .lbl { font-size:12px; color:#64748b; margin:14px 0 4px; font-weight:600; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ヒートマップ / データバー <span class="pill">cellStyle フック</span></h1>
  <div class="note" style="margin-top:8px">
  値に応じてセル<b>背景を連続色（ヒートマップ）</b>や<b>背景の棒（データバー）</b>に（<code>plugins/tss-heatmap.js</code>）。コアの <code>cellStyle</code> フック（セルにインラインCSS/CSS変数を差す）に乗せます。<b>クラス（cellClass）では出せない連続色</b>がこれ。<br>
  どのセルも<b>編集できます</b>（数値を打つと色やバーが即変わる）。文字色は背景に合わせて自動でコントラスト確保。
  </div>

  <div class="panel">
    <div class="lbl">店舗別 月次売上（数字を編集すると背景色が変化。低＝赤 / 高＝青）</div>
    <div class="hm"><div id="grid"></div></div>
    <div class="lbl" style="margin-top:16px">達成率（背景データバー＝数値はそのまま・編集可）</div>
    <div class="hm"><div id="grid2"></div></div>
  </div>
</div>

<script src="../src/tssgrid.js"></script>
<script src="../plugins/tss-heatmap.js"></script>
<script>
  const num = v => (v === '' || v == null) ? '' : Number(v).toLocaleString('ja-JP');
  // 低＝赤 / 中＝白 / 高＝青（diverging）。min/max は明示。
  const heat = TssHeatmap({ min: 100000, max: 400000, colors: ['#f8b4b4', '#ffffff', '#93c5fd'] });
  const MONTHS = ['m4', 'm5', 'm6', 'm7', 'm8', 'm9'];

  const grid = new TssGrid(document.getElementById('grid'), {
    name: 'sales', width: 800, rowHeight: 28, rowHeaders: false,
    columns: [
      { data: 'shop', title: '店舗', width: 80 },
      ...MONTHS.map((k, i) => ({ data: k, title: (i + 4) + '月', width: 110, type: 'number', align: 'right', format: num, cellStyle: heat })),
    ],
    data: [
      { shop: '神田',   m4: '388070', m5: '329299', m6: '220057', m7: '348073', m8: '323343', m9: '165449' },
      { shop: '品川',   m4: '388835', m5: '329299', m6: '220057', m7: '348073', m8: '274477', m9: '106903' },
      { shop: '新宿',   m4: '269245', m5: '360263', m6: '368486', m7: '286489', m8: '358885', m9: '207269' },
      { shop: '八王子', m4: '283675', m5: '308499', m6: '125730', m7: '275528', m8: '355067', m9: '291454' },
    ],
  });

  // データバー（背景に棒・数値はそのまま・編集可）
  const bar = TssDataBar({ min: 0, max: 100, color: 'rgba(21,115,192,.22)' });
  const grid2 = new TssGrid(document.getElementById('grid2'), {
    name: 'kpi', width: 360, rowHeight: 28, rowHeaders: false,
    columns: [
      { data: 'name', title: '担当', width: 140 },
      { data: 'rate', title: '達成率(%)', width: 200, type: 'number', align: 'right', cellStyle: bar },
    ],
    data: [
      { name: '佐藤', rate: '92' }, { name: '鈴木', rate: '68' },
      { name: '高橋', rate: '45' }, { name: '田中', rate: '110' },
    ],
  });
</script>
</body>
</html>
