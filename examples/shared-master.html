<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TssGrid 例 — 共有マスタ（左右2表で同一データ・別フィルタ・同時編集）</title>
<link rel="stylesheet" href="../src/tssgrid.css">
<link rel="stylesheet" href="../plugins/tss-filter.css">
<style>
  body { font-family: "Meiryo UI", "Meiryo", "Segoe UI", sans-serif; margin: 0; background: #eef1f5; color: #1f2733; }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 22px 20px 60px; }
  h1 { font-size: 18px; margin: 4px 0 2px; }
  .pill { display:inline-block; background:#1573c0; color:#fff; border-radius:10px; padding:1px 9px; font-size:12px; vertical-align:2px; }
  .note { background:#fff; border:1px solid #dde3ea; border-radius:8px; padding:11px 15px; font-size:12.5px; max-width:900px; color:#445; line-height:1.7; }
  .note b{ color:#1573c0; } code{ background:#eef2f6; padding:0 4px; border-radius:3px; }
  /* 左右2表の境をはっきり＋狭い画面では縦に積む（flex-wrap）＝詰まってもくっつかない。
     各カードは accent 色の上辺(赤/青)で区別。 */
  .cols { display:flex; flex-wrap:wrap; gap:28px 40px; align-items:flex-start; margin-top:14px; }
  .col { flex:1 1 480px; min-width:0; }
  .col:nth-child(1) .panel { border-top:3px solid #1573c0; }
  .col:nth-child(2) .panel { border-top:3px solid #0369a1; }
  .lbl { font-size:12px; color:#64748b; margin:0 0 6px; font-weight:600; display:flex; justify-content:space-between; }
  .panel { background:#fff; border:1px solid #e2e7ee; border-radius:10px; padding:12px; box-shadow:0 1px 3px rgba(20,40,80,.05); }
  .col:nth-child(1) .tssgrid { --tg-accent:#1573c0; --tg-header-bg:#3f3f46; --tg-header-fg:#f4f4f5; --tg-font-size:12px; }
  .col:nth-child(2) .tssgrid { --tg-accent:#0369a1; --tg-header-bg:#3f3f46; --tg-header-fg:#f4f4f5; --tg-font-size:12px; }
  .tssgrid .tg-wrap { max-height: 320px; }
  .stat { color:#94a3b8; font-weight:400; }
</style>
</head>
<body>
<div class="wrap">
  <h1>共有マスタ <span class="pill">tss-shared プラグイン</span></h1>
  <div class="note" style="margin-top:8px">
  <b>1つのマスタ（同じ行データ）を左右2グリッドで共有</b>（<code>plugins/tss-shared.js</code>）。左右は<b>別々のフィルタ</b>で表示でき、<b>片方で編集するともう片方の同じ行も即更新</b>（行参照を共有）。各見出しの<b>ロート（漏斗）アイコン</b>で絞り込み（tss-filter）。<br>
  試す: 左を「営業」、右を「東京」に絞る → 両方に出る人（営業かつ東京）の<b>給与を片側で編集 → もう片側も変わる</b>。
  </div>

  <div class="cols">
    <div class="col">
      <div class="lbl"><span>A系（赤）</span><span class="stat" id="statA"></span></div>
      <div class="panel"><div id="gridA"></div></div>
    </div>
    <div class="col">
      <div class="lbl"><span>B系（青）</span><span class="stat" id="statB"></span></div>
      <div class="panel"><div id="gridB"></div></div>
    </div>
  </div>
</div>

<script src="../src/tssgrid.js"></script>
<script src="../plugins/tss-filter.js"></script>
<script src="../plugins/tss-shared.js"></script>
<script>
  const depts = ['営業', '開発', '総務', '人事'], cities = ['東京', '大阪', '名古屋', '福岡'];
  const master = Array.from({ length: 200 }, (_, r) => [
    'E' + String(r + 1).padStart(4, '0'),
    ['佐藤', '鈴木', '高橋', '田中', '伊藤'][r % 5] + (r + 1),
    depts[r % 4], cities[(r * 3) % 4],
    String((r * 23 % 50 + 20) * 1000),
  ]);

  const shared = TssShared.create(master, {
    width: 480, height: '320px', rowHeaders: true, minSpareRows: 0,
    headers: ['番号', '氏名', '部署', '勤務地', '給与'],
    colWidths: [80, 120, 80, 80, 100],
    columns: [{ data: 'id' }, { data: 'name' }, { data: 'dept' }, { data: 'city' }, { data: 'salary', type: 'number', format: { thousands: true } }],
  });
  const mkStat = id => ({ count, total, cleared }) => { document.getElementById(id).textContent = cleared ? `全 ${total}` : `${count} / ${total}`; };
  const gridA = shared.attach(document.getElementById('gridA'), { plugins: [TssFilter.plugin()], onFilter: mkStat('statA') });
  const gridB = shared.attach(document.getElementById('gridB'), { plugins: [TssFilter.plugin()], onFilter: mkStat('statB') });
  document.getElementById('statA').textContent = `全 ${gridA.ROWS}`;
  document.getElementById('statB').textContent = `全 ${gridB.ROWS}`;
</script>
</body>
</html>
